name: RAG Quality Evaluation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Ensure the backport is installed for Python 3.9 compatibility
        pip install eval_type_backport

    - name: Run RAGAS Evaluation
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        # Add other env vars if needed for retrieval
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python src/evaluation/eval_pipeline.py

    - name: Check Quality Gate
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python src/evaluation/quality_gate.py
